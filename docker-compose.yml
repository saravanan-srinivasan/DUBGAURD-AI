version: '3.8'

services:
  backend:
    build:
      context: ./dubguard-backend
    ports:
      - "8000:8000"
    volumes:
      - ./dubguard-backend:/app
    environment:
      - ENVIRONMENT=development

  frontend:
    build:
      context: ./dubguard-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./dubguard-frontend:/app
      - /app/node_modules
    depends_on:
      - backend
